<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Portal | STEM Division</title>
    <style>
        :root { --bg: #050a0f; --sidebar: #0a192f; --accent: #64ffda; --text: #ccd6f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid #233554; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #233554; background: #0c1d36; }
        .course-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .module-section { margin-bottom: 20px; }
        .module-section h3 { font-size: 11px; color: #8892b0; text-transform: uppercase; letter-spacing: 1px; padding-left: 10px; }
        
        .nav-item { display: flex; align-items: center; padding: 12px; text-decoration: none; color: #fff; font-size: 13px; border-radius: 4px; margin-bottom: 4px; transition: 0.2s; border: 1px solid transparent; }
        .nav-item:hover { background: #112240; border-color: #233554; }
        .nav-item.active { background: #1d2d44; border-left: 4px solid var(--accent); color: var(--accent); }
        
        .type-tag { font-size: 9px; margin-left: auto; padding: 2px 5px; border-radius: 3px; background: #233554; color: #8892b0; }
        .exam-tag { background: #3d1919; color: #ff4d4d; border: 1px solid #ff4d4d; }

        /* Content */
        .viewport-container { flex: 1; display: flex; flex-direction: column; }
        .top-bar { height: 50px; background: var(--sidebar); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #233554; font-size: 14px; }
        iframe { flex: 1; border: none; background: white; } /* Khan exercises need white backgrounds to look correct */

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; margin-right: 10px; }
        .done .status-dot { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="margin:0; font-size:16px; color:white;">STEM Curriculum v2.0</h2>
        <div style="font-size:10px; color:var(--accent); margin-top:5px;">● CLOUD SYNC ACTIVE</div>
    </div>
    
    <div class="course-list">
        <div class="module-section">
            <h3>Module 1: Quantitative Foundations</h3>
            <a href="#" class="nav-item active" onclick="loadLesson('../exercises/addition_1.html', 'Exercise 1.1: Addition Mastery', this)">
                <div class="status-dot"></div> Addition Foundations <span class="type-tag">LESSON</span>
            </a>
            <a href="#" class="nav-item" onclick="loadLesson('../exercises/subtraction_1.html', 'Exercise 1.2: Subtraction Logic', this)">
                <div class="status-dot"></div> Subtraction Systems <span class="type-tag">LESSON</span>
            </a>
            <a href="#" class="nav-item" onclick="loadLesson('../exercises/order_of_operations.html', 'Unit 1 Exam: Operations', this)">
                <div class="status-dot"></div> Unit 1 Final Exam <span class="type-tag exam-tag">TEST</span>
            </a>
        </div>

        <div class="module-section">
            <h3>Module 2: Kinetic Science</h3>
            <a href="#" class="nav-item" onclick="loadLesson('../exercises/significant_figures_1.html', 'Science Prep: Sig Figs', this)">
                <div class="status-dot"></div> Data Precision <span class="type-tag">PREP</span>
            </a>
            <a href="#" class="nav-item" onclick="loadLesson('physics/kinetics/index.html', 'Lab 2.1: Velocity & Momentum', this)">
                <div class="status-dot"></div> Momentum Simulation <span class="type-tag">LAB</span>
            </a>
            <a href="#" class="nav-item" onclick="loadLesson('../exercises/scientific_notation.html', 'Science Final: Notation', this)">
                <div class="status-dot"></div> Science Mastery Test <span class="type-tag exam-tag">TEST</span>
            </a>
        </div>
    </div>
</div>

<div class="viewport-container">
    <div class="top-bar">
        <span id="current-title">Exercise 1.1: Addition Mastery</span>
        <div style="margin-left:auto;">
            <button onclick="markDone()" style="background:var(--accent); border:none; padding:5px 15px; border-radius:3px; cursor:pointer; font-weight:bold;">Submit Score</button>
        </div>
    </div>
    <iframe id="viewer" src="../exercises/addition_1.html"></iframe>
</div>

<script>
    function loadLesson(url, title, el) {
        document.getElementById('viewer').src = url;
        document.getElementById('current-title').innerText = title;
        
        // UI Updates
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
    }

    function markDone() {
        const activeItem = document.querySelector('.nav-item.active');
        activeItem.classList.add('done');
        alert("Progress uploaded to student record.");
    }
</script>

</body>
</html>
