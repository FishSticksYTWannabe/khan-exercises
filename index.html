<!DOCTYPE html>
<html>
<head>
    <title>Student Portal | Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #050a0f; color: #ccd6f6; margin: 0; padding: 10px; }
        header { background: #0a192f; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #112240; }
        h1 { margin: 0; font-size: 20px; color: #64ffda; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #112240; padding: 15px; border-radius: 6px; border: 1px solid #233554; }
        .card h2 { margin: 0 0 5px 0; font-size: 16px; color: #fff; }
        .card p { margin: 0; font-size: 13px; color: #8892b0; line-height: 1.3; }
        .btn { display: block; background: #64ffda; color: #0a192f; text-align: center; 
               padding: 8px; text-decoration: none; border-radius: 4px; 
               font-weight: bold; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>
    <header>
        <h1>Student Resource Hub</h1>
    </header>

    <div class="grid">
        <div class="card">
            <h2>Mathematics</h2>
            <p>Khan Academy exercises and practice sets.</p>
            <a href="exercises/addition_1.html" class="btn">Open Math</a>
        </div>
        <div class="card">
            <h2>Science</h2>
            <p>Physics and biology laboratory simulations.</p>
            <a href="simulations/index.html" class="btn">Open Science</a>
        </div>
        <div class="card">
            <h2>Language</h2>
            <p>Vocabulary and linguistic analysis tools.</p>
            <a href="simulations/index.html" class="btn">Open Language</a>
        </div>
        <div class="card">
            <h2>Digital</h2>
            <p>Logic puzzles and spatial reasoning labs.</p>
            <a href="simulations/index.html" class="btn">Open Digital</a>
        </div>
    </div>
</body>
</html>
